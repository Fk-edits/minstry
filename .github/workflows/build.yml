name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Ensure capacitor.config.json exists
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId":"com.ethio.ministry","appName":"Ethio Ministry","webDir":"www"}' > capacitor.config.json
          fi

      - name: Show capacitor.config.json (debug)
        run: cat capacitor.config.json

      - name: Ensure www folder has content
        run: |
          if [ ! -d "www" ] || [ -z "$(ls -A www)" ]; then
            echo "www is empty – copying root files to www"
            mkdir -p www
            cp -r ./* www/ 2>/dev/null || true
          fi

      - name: Initialize Capacitor with explicit parameters
        run: npx cap init Ethio Ministry com.ethio.ministry --web-dir www

      - name: Add Android Platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

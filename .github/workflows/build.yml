name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Verify capacitor.config.json
        run: |
          if [ -f "capacitor.config.json" ]; then
            echo "✅ capacitor.config.json found"
            cat capacitor.config.json
          else
            echo '{"appId":"com.ethio.ministry","appName":"Ethio Ministry","webDir":"www"}' > capacitor.config.json
          fi

      - name: Prepare www folder
        run: |
          # Create www if missing
          mkdir -p www
          # Copy all files from root to www (overwrite)
          cp -r ./* www/ 2>/dev/null || true
          # Verify index.html is there
          if [ -f "www/index.html" ]; then
            echo "✅ index.html found in www"
          else
            echo "❌ index.html NOT found in www – listing www contents:"
            ls -la www/
            exit 1
          fi

      - name: Add Android Platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Add Question – Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin-add-question.css">
</head>
<body>
  <div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <span class="header-title">Add / Edit Question</span>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
  <div class="form-container">
    <form id="questionForm">
      <div class="form-group">
        <label>Grade <span class="required">*</span></label>
        <select id="gradeSelect" required>
          <option value="grade6">Grade 6</option>
          <option value="grade8" selected>Grade 8</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subject <span class="required">*</span></label>
        <select id="subjectSelect" required>
          <option value="">Select Subject</option>
          <option value="Mathematics">Mathematics</option>
          <option value="General Science">General Science</option>
          <option value="Social Science">Social Science</option>
          <option value="Sidamo Afoo">Sidamo Afoo</option>
          <option value="English">English</option>
          <option value="Amharic">Amharic</option>
          <option value="Citizenship">Citizenship</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year <span class="required">*</span></label>
        <select id="yearSelect" required>
          <option value="">Select Year</option>
        </select>
      </div>
      <div class="form-group">
        <label>Question Number <span class="required">*</span></label>
        <input type="number" id="questionNumber" min="1" required>
      </div>
      <div class="form-group">
        <label>Question Text <span class="required">*</span></label>
        <textarea id="questionText" rows="3" required></textarea>
      </div>
      <div class="form-group">
        <label>Option A <span class="required">*</span></label>
        <input type="text" id="optionA" required>
      </div>
      <div class="form-group">
        <label>Option B <span class="required">*</span></label>
        <input type="text" id="optionB" required>
      </div>
      <div class="form-group">
        <label>Option C <span class="required">*</span></label>
        <input type="text" id="optionC" required>
      </div>
      <div class="form-group">
        <label>Option D <span class="required">*</span></label>
        <input type="text" id="optionD" required>
      </div>
      <div class="form-group">
        <label>Correct Answer <span class="required">*</span></label>
        <select id="correctAnswer" required>
          <option value="">-- Select --</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
      </div>
      <div class="form-group">
        <label>Image URL (optional)</label>
        <input type="url" id="imageURL" placeholder="https://example.com/image.png">
      </div>
      <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> Save Question</button>
    </form>
  </div>
  <script type="module" src="js/modules/admin-add-question.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Notes – Ethio Ministry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/note.css">
</head>
<body>
  <div class="header">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="header-title" id="noteTitle">Notes</span>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
  <div class="note-container" id="noteContainer">
    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading notes...</div>
  </div>
  <script type="module">
    import { loadLanguage, getCurrentLanguage } from './js/modules/languages.js';
    document.addEventListener('DOMContentLoaded', () => loadLanguage(getCurrentLanguage()));
    import './js/modules/note.js';
  </script>
</body>
</html>

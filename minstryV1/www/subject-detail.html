<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Subject Detail – Ethio Ministry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/subject-detail.css">
</head>
<body>
  <div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <span class="header-title" id="subjectTitle">Subject</span>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
  <div class="detail-container" id="detailContainer">
    <div class="year-tabs" id="yearTabs"></div>
    <div class="progress-card" id="progressCard">
      <div class="progress-stats">
        <div><span class="label">Progress</span><span class="value" id="progressPercent">0%</span></div>
        <div><span class="label">Questions</span><span class="value" id="totalQuestions">0</span></div>
        <div><span class="label">Time</span><span class="value" id="totalTime">0:00</span></div>
        <div><span class="label">Last Practiced</span><span class="value" id="lastPracticed">Never</span></div>
      </div>
    </div>
    <div class="units-list" id="unitsList"></div>
    <div class="unlock-card" id="unlockCard">
      <div class="unlock-info"><span class="subject-name" id="unlockSubject">Subject</span><span class="year" id="unlockYear">Year</span><span class="size">1.2 MB</span></div>
      <button class="btn btn-primary" id="unlockDownloadBtn"><i class="fas fa-download"></i> Unlock</button>
      <p class="hint">Download usually takes between 5 seconds and 1 minute...</p>
    </div>
  </div>
  <script type="module">
    import { loadLanguage, getCurrentLanguage } from './js/modules/languages.js';
    document.addEventListener('DOMContentLoaded', () => loadLanguage(getCurrentLanguage()));
    import './js/modules/subject-detail.js';
  </script>
</body>
</html>

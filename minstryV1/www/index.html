<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ethio Ministry – Grade 6 & 8</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .splash-container {
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-icon {
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 1rem;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(0deg); }
    }
    .app-name {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .app-name span { color: var(--accent); }
    .app-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .tagline {
      background: var(--bg-hover);
      color: var(--text-primary);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      display: inline-block;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border-color);
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-width: 280px;
      margin: 0 auto;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      text-align: center;
      transition: var(--transition);
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 6px rgba(37,99,235,0.3);
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--border-color);
    }
    .btn-outline:hover { border-color: var(--accent); background: var(--bg-hover); }
    .btn-outline:active { transform: scale(0.97); }
    .lang-selector {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      background: var(--bg-secondary);
      border-radius: 40px;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border-color);
    }
    .lang-selector select {
      background: transparent;
      border: none;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-primary);
      padding: 0.2rem;
      outline: none;
      cursor: pointer;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="lang-selector">
    <select id="langToggle">
      <option value="en">English</option>
      <option value="am">አማርኛ</option>
      <option value="om">Afaan Oromo</option>
      <option value="si">Sidaamu Afoo</option>
    </select>
  </div>

  <div class="splash-container">
    <div class="splash-icon">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <div class="app-name">Ethio <span>Ministry</span></div>
    <div class="app-sub" data-i18n="exam_prep">Grade 6 & 8 Exam Preparation</div>
    <div class="tagline" data-i18n="your_future_starts_here">
      <i class="fas fa-star" style="color:#f59e0b; margin-right:0.4rem;"></i>
      Your future starts here
    </div>
    <div class="actions">
      <a href="login.html" class="btn btn-primary" data-i18n="login">Login</a>
      <a href="signup.html" class="btn btn-outline" data-i18n="signup">Sign Up</a>
    </div>
    <div class="footer">
      <i class="fas fa-book-open"></i> <span data-i18n="knowledge_is_power">Knowledge is power</span>
    </div>
  </div>

  <script type="module">
    import { auth, onAuthStateChanged } from './js/firebase-config.js';
    import { loadLanguage, getCurrentLanguage, setLanguage } from './js/modules/languages.js';

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Language
    const langToggle = document.getElementById('langToggle');
    const savedLang = getCurrentLanguage();
    langToggle.value = savedLang;
    loadLanguage(savedLang);
    langToggle.addEventListener('change', (e) => {
      setLanguage(e.target.value);
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw/sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>

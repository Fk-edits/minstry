<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Result – Ethio Ministry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/result.css">
</head>
<body>
  <div class="header">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="header-title">Exam Results</span>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
  <div class="result-container" id="resultContainer">
    <div class="result-summary" id="resultSummary">
      <div class="score" id="scoreDisplay">0/0</div>
      <div class="percentage" id="percentageDisplay">0%</div>
      <div class="message" id="messageDisplay"></div>
    </div>
    <div class="result-details" id="resultDetails"></div>
    <button class="btn btn-primary" id="retryBtn"><i class="fas fa-redo"></i> Retry</button>
    <button class="btn btn-outline" id="dashboardBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
  </div>
  <script type="module">
    import { loadLanguage, getCurrentLanguage } from './js/modules/languages.js';
    document.addEventListener('DOMContentLoaded', () => loadLanguage(getCurrentLanguage()));
    import './js/modules/result.js';
  </script>
</body>
</html>

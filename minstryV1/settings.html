<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Settings – Ethio Ministry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .settings-page { max-width: 480px; margin: 0 auto; padding: 1.5rem; }
    .settings-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .settings-header .back-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); }
    .settings-header h1 { font-size: 1.3rem; font-weight: 700; flex: 1; }
    .settings-group { margin-bottom: 1.5rem; }
    .settings-group h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
    .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
    .settings-item .label { font-weight: 500; }
    .settings-item .value { color: var(--text-secondary); }
    .settings-item select { padding: 0.2rem 0.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); }
    .settings-item .btn { padding: 0.2rem 1rem; font-size: 0.8rem; }
    .btn-danger { background: var(--danger); color: white; border: none; padding: 0.6rem; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="settings-page">
    <div class="settings-header">
      <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
      <h1>Settings</h1>
      <button class="theme-toggle" id="themeToggle" style="margin-left:auto;"><i class="fas fa-moon"></i></button>
    </div>

    <div class="settings-group">
      <h3>Profile</h3>
      <div class="settings-item">
        <span class="label">Name</span>
        <span class="value" id="displayName">User</span>
        <button class="btn btn-outline" id="editNameBtn">Edit</button>
      </div>
      <div class="settings-item">
        <span class="label">Email</span>
        <span class="value" id="displayEmail">user@email.com</span>
      </div>
    </div>

    <div class="settings-group">
      <h3>Security</h3>
      <div class="settings-item">
        <span class="label">Change Password</span>
        <button class="btn btn-outline" id="changePasswordBtn">Reset</button>
      </div>
    </div>

    <div class="settings-group">
      <h3>Preferences</h3>
      <div class="settings-item">
        <span class="label">Language</span>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="am">አማርኛ</option>
          <option value="om">Afaan Oromo</option>
          <option value="si">Sidaamu Afoo</option>
        </select>
      </div>
      <div class="settings-item">
        <span class="label">Show correct answer</span>
        <select id="showAnswerSelect">
          <option value="afterfinish">After finishing</option>
          <option value="rightaway">Right away</option>
        </select>
      </div>
    </div>

    <button class="btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <script type="module">
    import { loadLanguage, getCurrentLanguage } from './js/modules/languages.js';
    document.addEventListener('DOMContentLoaded', () => {
      loadLanguage(getCurrentLanguage());
      // set language select
      document.getElementById('languageSelect').value = getCurrentLanguage();
    });
    import './js/modules/settings.js';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Payment – Ethio Ministry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .payment-page { max-width: 420px; margin: 0 auto; padding: 1.5rem; text-align: center; }
    .payment-page .icon { font-size: 3rem; color: var(--accent); margin-bottom: 1rem; }
    .payment-page h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .payment-page .sub { color: var(--text-secondary); margin-bottom: 2rem; }
    .payment-option { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; border: 2px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 0.6rem; cursor: pointer; transition: var(--transition); }
    .payment-option:hover { border-color: var(--accent); }
    .payment-option.selected { border-color: var(--accent); background: var(--accent-light); }
    .payment-option input[type="radio"] { accent-color: var(--accent); width: 18px; height: 18px; }
    .payment-option .details { flex: 1; text-align: left; }
    .payment-option .details .label { font-weight: 600; }
    .payment-option .details .price { font-size: 0.9rem; color: var(--text-secondary); }
    .method-row { display: flex; gap: 0.8rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    .method-btn { padding: 0.5rem 1.2rem; border: 1px solid var(--border-color); border-radius: 60px; background: var(--bg-primary); cursor: pointer; transition: var(--transition); font-weight: 500; }
    .method-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .phone-display { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin: 0.5rem 0; }
    .copy-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; }
    .copy-btn:hover { text-decoration: underline; }
    .transaction-input { margin: 1rem 0; }
    .transaction-input input { width: 100%; padding: 0.6rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); }
    .btn { width: 100%; }
    .payment-status { margin-top: 1rem; font-weight: 600; color: var(--success); display: none; }
  </style>
</head>
<body>
  <div class="payment-page">
    <div class="icon"><i class="fas fa-credit-card"></i></div>
    <h1>Unlock Content</h1>
    <p class="sub">Choose your payment option</p>

    <div id="paymentOptions">
      <div class="payment-option" data-grade="both">
        <input type="radio" name="grade" value="both" id="both">
        <div class="details"><span class="label">Pay All</span><span class="price">Both Grade 6 & 8 – <span id="bothPriceDisplay">500</span> Birr</span></div>
      </div>
      <div class="payment-option" data-grade="grade6">
        <input type="radio" name="grade" value="grade6" id="grade6">
        <div class="details"><span class="label">Grade 6</span><span class="price">Only Grade 6 – <span id="grade6PriceDisplay">300</span> Birr</span></div>
      </div>
      <div class="payment-option" data-grade="grade8">
        <input type="radio" name="grade" value="grade8" id="grade8">
        <div class="details"><span class="label">Grade 8</span><span class="price">Only Grade 8 – <span id="grade8PriceDisplay">300</span> Birr</span></div>
      </div>
    </div>

    <div class="method-row" id="methodRow">
      <button class="method-btn active" data-method="Telebirr">Telebirr</button>
      <button class="method-btn" data-method="CBE Birr">CBE Birr</button>
    </div>

    <div class="phone-display">
      <span id="phoneNumberDisplay">09XXXXXXXX</span>
      <button class="copy-btn" id="copyPhoneBtn"><i class="fas fa-copy"></i> Copy</button>
    </div>

    <div class="transaction-input">
      <label>Transaction ID <span class="required">*</span></label>
      <input type="text" id="transactionId" placeholder="Enter transaction ID from your payment" required>
    </div>

    <button class="btn btn-primary" id="confirmPaymentBtn"><i class="fas fa-check-circle"></i> I have paid</button>
    <div id="paymentStatus" class="payment-status">✅ Payment request sent! Awaiting admin approval.</div>
    <p style="margin-top:1rem; font-size:0.8rem; color:var(--text-muted);">Your request will be processed within 24 hours.</p>
  </div>

  <script type="module">
    import { loadLanguage, getCurrentLanguage } from './js/modules/languages.js';
    document.addEventListener('DOMContentLoaded', () => loadLanguage(getCurrentLanguage()));
    import './js/modules/payment.js';
  </script>
</body>
</html>
